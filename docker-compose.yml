services:
  proxylens:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PROXYLENS_ENV: production
      PROXYLENS_ADDR: :8080
      PROXYLENS_DB_PATH: /app/data/proxylens.db
    volumes:
      - proxylens-data:/app/data

volumes:
  proxylens-data:
